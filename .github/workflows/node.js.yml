# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on: workflow_dispatch

jobs:
  build:

    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [20.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: |
        cat /proc/cpuinfo
        top -n 1 -b
        df -h
        pwd
        ls -aFl
        set
    - run: |
        mkdir -p $HOME/.local/bin && cp -nv ttfautohint.bin $HOME/.local/bin/ttfautohint
        chmod -v 755 $HOME/.local/bin/ttfautohint
    - run: npm install
    # - run: npm run build -- ttf::Iosevka
    # - run: npm run build -- ttf::IosevkaSlab
    - run: npm run build -- ttf-unhinted::IosevkaN
    - run: npm run build -- ttf-unhinted::IosevkaNStatic
    - run: npm run build -- ttf-unhinted::IosevkaNTerm
    - run: npm run build -- ttf-unhinted::IosevkaNFixed
    - run: npm run build -- ttf-unhinted::IosevkaNSlab
    - run: npm run build -- ttf-unhinted::IosevkaNStaticSlab
    - run: npm run build -- ttf-unhinted::IosevkaNTermSlab
    - run: npm run build -- ttf-unhinted::IosevkaNFixedSlab
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist
        if-no-files-found: warn
